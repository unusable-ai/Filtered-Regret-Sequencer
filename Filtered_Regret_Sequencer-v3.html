<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Filtered Regret Sequencer</title>
  <style>
    :root{
      --bg:#0b0d12;
      --panel:#0f1420;
      --line: rgba(255,255,255,.08);
      --text: rgba(240,244,255,.92);
      --muted: rgba(240,244,255,.55);
      --on: rgba(99,230,190,.95);
      --hit: rgba(255,212,59,.95);
      --acc: rgba(116,192,252,.95);
      --warn: rgba(255,212,59,.95);
      --shadow: 0 10px 28px rgba(0,0,0,.45);
      --r: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --ui: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

      --stepH: 64px;
      --stepGap: 6px;
      --actH: 10px;
      --ctrlW: 116px;
      --ctrlH: 28px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 50% -20%, rgba(116,192,252,.08), transparent 60%),
                  radial-gradient(900px 600px at 10% 120%, rgba(99,230,190,.06), transparent 55%),
                  var(--bg);
      color:var(--text);
      font-family: var(--ui);
      overflow-x:hidden;
    }

    header{
      position: sticky;
      top:0;
      z-index:20;
      background: rgba(8,10,14,.78);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px 12px;
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    main{
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px 12px 60px;
      display:flex;
      flex-direction: column;
      gap: 12px;
    }

    .lane{
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .lane-top{
      padding: 10px 10px 8px;
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    /* ---- custom controls ---- */
    .vslider{
      width: var(--ctrlW);
      user-select:none;
      touch-action:none;
    }
    .vslider .top{
      display:flex;
      justify-content: space-between;
      align-items: baseline;
      gap:8px;
      margin-bottom: 6px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing:.2px;
      color: rgba(240,244,255,.72);
    }
    .vslider .lab{ opacity:.75; }
    .vslider .val{ opacity:.85; }

    .track{
      position: relative;
      height: var(--ctrlH);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);
      overflow:hidden;
      cursor: pointer;
    }

    .track .rail{
      position:absolute;
      left:10px;
      right:10px;
      top:50%;
      height:4px;
      transform: translateY(-50%);
      border-radius: 99px;
      background: rgba(255,255,255,.10);
      overflow:hidden;
    }
    .track .fill{
      height:100%;
      width:50%;
      background: rgba(116,192,252,.85);
    }
    .track .dot{
      position:absolute;
      top:50%;
      transform: translate(-50%,-50%);
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.12);
      box-shadow: 0 4px 10px rgba(0,0,0,.35);
    }

    .track.pan .fill{ display:none; }
    .track.pan .rail{ background: rgba(255,255,255,.08); }
    .track.pan .mid{
      position:absolute;
      left:50%;
      top:50%;
      width:2px;
      height:10px;
      transform: translate(-50%,-50%);
      background: rgba(255,255,255,.12);
      border-radius: 2px;
      pointer-events:none;
    }

    .cycle{
      width: 76px;
      user-select:none;
      touch-action: manipulation;
      cursor:pointer;
    }
    .cycle .top{ margin-bottom:6px; }
    .cycle .track{
      display:grid;
      place-items:center;
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(240,244,255,.86);
    }

    .btn{
      width: 54px;
      height: var(--ctrlH);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      display:grid;
      place-items:center;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing:.2px;
      color: rgba(240,244,255,.86);
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);
    }
    .btn:active{ transform: translateY(1px); }
    .btn.on{ border-color: rgba(99,230,190,.55); background: rgba(99,230,190,.10); }
    .btn.warn{ border-color: rgba(255,212,59,.55); background: rgba(255,212,59,.08); }
    .btn.danger{ border-color: rgba(255,107,107,.55); background: rgba(255,107,107,.08); }

    .pill{
      height: var(--ctrlH);
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      display:flex;
      align-items:center;
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(240,244,255,.78);
      letter-spacing:.2px;
    }

    /* ---- steps ---- */
    .seq-wrap{ padding: 10px 12px 12px; }
    .seq{
      display:grid;
      grid-template-columns: repeat(16, 1fr);
      gap: var(--stepGap);
    }

    .step{
      position:relative;
      height: var(--stepH);
      border-radius: 10px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      overflow:hidden;
      display:flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      user-select:none;
    }
    .step.on{
      border-color: rgba(99,230,190,.45);
      background: rgba(99,230,190,.08);
    }
    .step.cursor::after{
      content:"";
      position:absolute;
      inset:-1px;
      border:2px solid rgba(116,192,252,.75);
      border-radius:12px;
      pointer-events:none;
      box-shadow:0 0 0 3px rgba(116,192,252,.10);
    }

    .act{
      height: var(--actH);
      border-radius: 8px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      cursor:pointer;
    }
    .step.on .act{
      border-color: rgba(99,230,190,.55);
      background: rgba(99,230,190,.20);
    }
    .act.hit{
      animation: hitBlink 140ms ease-in-out 0s 2;
    }
    @keyframes hitBlink{
      0%{ box-shadow: 0 0 0 0 rgba(255,212,59,.0); background: rgba(255,212,59,.10);}
      50%{ box-shadow: 0 0 0 6px rgba(255,212,59,.14); background: rgba(255,212,59,.22);}
      100%{ box-shadow: 0 0 0 0 rgba(255,212,59,.0); }
    }

    .set{
      flex:1;
      display:grid;
      grid-template-columns: 16px 16px 36px 1fr;
      gap: 6px;
      align-items:center;
      min-height: 0;
    }

    .led{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      cursor:pointer;
    }
    .led.acc.on{ background: rgba(116,192,252,.90); border-color: rgba(116,192,252,.90); }
    .led.last.on{ background: rgba(255,212,59,.95); border-color: rgba(255,212,59,.95); }

    .rat{
      height: 14px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      display:flex;
      gap:3px;
      padding:2px 4px;
      cursor:pointer;
      align-items:center;
      justify-content:center;
    }
    .pip{
      width:5px;
      height:8px;
      border-radius: 3px;
      background: rgba(255,255,255,.10);
    }
    .pip.on{ background: rgba(240,244,255,.55); }

    .prob{
      --ctrlH: 18px;
      width: 100%;
    }
    .prob .top{ display:none; }
    .prob .track{ height: 18px; border-radius: 10px; }
    .prob .track .rail{ left:7px; right:7px; height:4px; }
    .prob .track .dot{ width: 8px; height: 8px; }

    /* responsive step grid */
    @media (max-width: 940px){
      .seq{ grid-template-columns: repeat(8, 1fr); }
    }
    @media (max-width: 540px){
      :root{ --stepH:56px; --ctrlW: 46%; }
      .seq{ grid-template-columns: repeat(4, 1fr); }
      .wrap{ gap:8px; }
    }

    .disabled{ opacity:.55; pointer-events:none; filter:grayscale(.2); }

    .toast{
      position:fixed;
      left:16px;
      bottom:16px;
      z-index:100;
      background:rgba(0,0,0,.7);
      border:1px solid rgba(255,255,255,.10);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      font-size:12px;
      max-width:min(520px, calc(100% - 32px));
      display:none;
    }
    .toast.show{ display:block; }
  </style>
</head>
<body>
  <header>
    <div class="wrap" id="master"></div>
  </header>

  <main id="app"></main>
  <div class="toast" id="toast"></div>

<script>
(() => {
  // Humans love vague specs. So here are the current rules:
  // - One shared noise source feeds 6 lanes.
  // - Each lane uses 4 cascaded bandpass filters to get "steeper-ish" slopes.
  // - Per-step decay is removed. Lane has a decay max (0..500ms).
  // - Steps have on/off, probability, ratchet, last, accent.
  // - Randomize button randomizes lanes AND steps.

  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const lerp = (a, b, t) => a + (b-a)*t;
  const nowMs = () => performance.now();
  const $ = (sel) => document.querySelector(sel);

  const DIVS = ["1/32","1/16","1/8","1/4"]; // lane clock divisions
  const DELAY_DIVS = ["1/16","1/8","1/4","1/2","1"]; // delay sync
  const DELAY_FEELS = ["straight","dotted","triplet"];
  const SYNC_MODES = ["internal","midi-master","midi-slave"];

  const FREQ_MIN = 60;
  const FREQ_MAX = 5000;
  const DECAY_MAX = 0.5; // seconds
  const DELAY_WET_MAX = 0.5;
  const DELAY_FB_MAX = 0.30;

  // --- formatting ---
  function fmtHz(v){
    if(v >= 1000) return (v/1000).toFixed(v>=2000 ? 1 : 2).replace(/0+$/,'').replace(/\.$/,'') + 'k';
    return String(Math.round(v));
  }
  function fmtPct(v){ return String(Math.round(v*100)); }
  function fmtMs(s){ return String(Math.round(s*1000)); }

  // --- toasts (minimal nagging) ---
  const toastEl = $("#toast");
  let toastT = null;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastT);
    toastT = setTimeout(() => toastEl.classList.remove("show"), 1600);
  }

  // --- log mapping for freq ---
  function logToNorm(v, min, max){
    v = clamp(v, min, max);
    return Math.log(v/min) / Math.log(max/min);
  }
  function normToLog(t, min, max){
    t = clamp(t, 0, 1);
    return min * Math.pow(max/min, t);
  }

  // ---------------------------
  // State
  // ---------------------------
  const DEFAULT = {
    tempo: 120,
    masterVol: 0.8,
    accentAmt: 0.35,
    delay: { div:"1/4", feel:"straight", wet:0.15, fb:0.20 },
    syncMode: "internal",
    midi: { outId: null, inId: null },
    lanes: Array.from({length:6}).map((_, i) => ({
      division: "1/16",
      level: 0.9,
      pan: 0.0,
      f: clamp(800 + i*260, FREQ_MIN, FREQ_MAX),
      q: 8.0,
      width: 0.25,
      decayMax: 0.20,
      steps: Array.from({length:16}).map(() => ({
        on:false,
        prob:1.0,
        rat:1,
        last:false,
        acc:false
      }))
    }))
  };

  const LS_KEYS = ["noise-drum-state-v3", "noise-drum-state-v2", "noise-drum-state-v1"]; // upgrade path

  function normalizeLast(lane){
    let last = -1;
    lane.steps.forEach((s,i)=>{ if(s.last) last = i; });
    lane.steps.forEach((s,i)=> s.last = (i===last));
  }

  function loadState(){
    try{
      let raw = null;
      let keyUsed = null;
      for(const k of LS_KEYS){
        const r = localStorage.getItem(k);
        if(r){ raw = r; keyUsed = k; break; }
      }
      if(!raw) return structuredClone(DEFAULT);
      const s = JSON.parse(raw);

      const out = structuredClone(DEFAULT);
      if(typeof s.tempo === "number") out.tempo = clamp(s.tempo, 20, 300);
      if(typeof s.masterVol === "number") out.masterVol = clamp(s.masterVol, 0, 1);
      if(typeof s.accentAmt === "number") out.accentAmt = clamp(s.accentAmt, 0, 1);

      if(s.delay){
        out.delay.div = DELAY_DIVS.includes(s.delay.div) ? s.delay.div : out.delay.div;
        out.delay.feel = DELAY_FEELS.includes(s.delay.feel) ? s.delay.feel : out.delay.feel;
        if(typeof s.delay.wet === "number") out.delay.wet = clamp(s.delay.wet, 0, DELAY_WET_MAX);
        if(typeof s.delay.fb === "number") out.delay.fb = clamp(s.delay.fb, 0, DELAY_FB_MAX);
      }

      out.syncMode = SYNC_MODES.includes(s.syncMode) ? s.syncMode : out.syncMode;
      if(s.midi){
        out.midi.outId = s.midi.outId ?? out.midi.outId;
        out.midi.inId  = s.midi.inId  ?? out.midi.inId;
      }

      if(Array.isArray(s.lanes) && s.lanes.length === 6){
        out.lanes = out.lanes.map((lane, i) => {
          const l = s.lanes[i] || {};
          lane.division = DIVS.includes(l.division) ? l.division : lane.division;
          if(typeof l.level === "number") lane.level = clamp(l.level, 0, 1);
          if(typeof l.pan === "number") lane.pan = clamp(l.pan, -1, 1);
          if(typeof l.f === "number") lane.f = clamp(l.f, FREQ_MIN, FREQ_MAX);
          if(typeof l.q === "number") lane.q = clamp(l.q, 0.3, 30);
          if(typeof l.width === "number") lane.width = clamp(l.width, 0, 1);
          if(typeof l.decayMax === "number") lane.decayMax = clamp(l.decayMax, 0.01, DECAY_MAX);

          if(Array.isArray(l.steps) && l.steps.length === 16){
            lane.steps = lane.steps.map((st, j) => {
              const x = l.steps[j] || {};
              st.on = !!x.on;
              // NOTE: v1/v2 had per-step decay; ignored.
              if(typeof x.prob === "number") st.prob = clamp(x.prob, 0, 1);
              if(typeof x.rat === "number") st.rat = clamp(x.rat|0, 1, 4);
              st.last = !!x.last;
              st.acc = !!x.acc;
              return st;
            });
          }
          normalizeLast(lane);
          return lane;
        });
      }

      // migrate forward
      if(keyUsed !== LS_KEYS[0]){
        try{ localStorage.setItem(LS_KEYS[0], JSON.stringify(out)); }catch(e){}
      }

      return out;
    }catch(e){
      console.warn(e);
      return structuredClone(DEFAULT);
    }
  }

  function saveState(){
    try{ localStorage.setItem(LS_KEYS[0], JSON.stringify(state)); }catch(e){}
  }

  let state = loadState();

  // ---------------------------
  // UI components
  // ---------------------------
  function createVSlider({label, min, max, value, map="linear", step=0, dotOnly=false, showValue=true, formatter=null, className=""}, onChange){
    const root = document.createElement("div");
    root.className = "vslider " + className;

    const top = document.createElement("div");
    top.className = "top";
    const lab = document.createElement("div");
    lab.className = "lab";
    lab.textContent = label;
    const valEl = document.createElement("div");
    valEl.className = "val";
    top.appendChild(lab);
    top.appendChild(valEl);

    const track = document.createElement("div");
    track.className = "track" + (dotOnly ? " pan" : "");
    const rail = document.createElement("div");
    rail.className = "rail";
    const fill = document.createElement("div");
    fill.className = "fill";
    rail.appendChild(fill);
    const dot = document.createElement("div");
    dot.className = "dot";
    track.appendChild(rail);
    if(dotOnly){
      const mid = document.createElement("div");
      mid.className = "mid";
      track.appendChild(mid);
    }
    track.appendChild(dot);

    root.appendChild(top);
    root.appendChild(track);

    let _v = value;

    function toNorm(v){
      if(map === "log") return logToNorm(v, min, max);
      return (v - min) / (max - min);
    }
    function fromNorm(t){
      if(map === "log") return normToLog(t, min, max);
      return min + t * (max - min);
    }

    function apply(v, fire=false){
      _v = clamp(v, min, max);
      if(step && map !== "log"){
        _v = Math.round(_v/step) * step;
      }
      const t = clamp(toNorm(_v), 0, 1);
      if(!dotOnly) fill.style.width = (t*100).toFixed(2) + "%";
      const rect = track.getBoundingClientRect();
      const w = rect.width || 0;
      const pad = 10;
      const x = (w > pad*2) ? (pad + t*(w - pad*2)) : (t*w);
      dot.style.left = x + "px";
      if(showValue){
        const txt = formatter ? formatter(_v) : (step >= 1 ? String(Math.round(_v)) : _v.toFixed(2));
        valEl.textContent = txt;
      }else{
        valEl.textContent = "";
      }
      if(fire && onChange) onChange(_v);
    }

    let dragging = false;
    function setFromEvent(e){
      const rect = track.getBoundingClientRect();
      const x = (e.clientX ?? (e.touches && e.touches[0]?.clientX) ?? 0);
      const t = clamp((x - rect.left) / rect.width, 0, 1);
      const v = fromNorm(t);
      apply(v, true);
    }

    track.addEventListener("pointerdown", (e) => {
      dragging = true;
      track.setPointerCapture(e.pointerId);
      setFromEvent(e);
    });
    track.addEventListener("pointermove", (e) => {
      if(!dragging) return;
      setFromEvent(e);
    });
    track.addEventListener("pointerup", (e) => {
      dragging = false;
      try{ track.releasePointerCapture(e.pointerId); }catch(_e){}
    });
    track.addEventListener("pointercancel", () => { dragging = false; });

    apply(_v, false);

    return {
      el: root,
      get: () => _v,
      set: (v) => apply(v, false),
      setAndFire: (v) => apply(v, true)
    };
  }

  function createCycle({label, value, options, fmt=(v)=>v}, onChange){
    const root = document.createElement("div");
    root.className = "vslider cycle";

    const top = document.createElement("div");
    top.className = "top";
    const lab = document.createElement("div");
    lab.className = "lab";
    lab.textContent = label;
    const valEl = document.createElement("div");
    valEl.className = "val";
    top.appendChild(lab);
    top.appendChild(valEl);

    const track = document.createElement("div");
    track.className = "track";

    root.appendChild(top);
    root.appendChild(track);

    let _v = value;
    function apply(v, fire=false){
      _v = v;
      valEl.textContent = fmt(_v);
      track.textContent = fmt(_v);
      if(fire && onChange) onChange(_v);
    }

    function cycle(dir){
      const i = options.indexOf(_v);
      const ni = (i + dir + options.length) % options.length;
      apply(options[ni], true);
    }

    track.addEventListener("click", () => cycle(1));
    track.addEventListener("contextmenu", (e) => { e.preventDefault(); cycle(-1); });

    apply(_v, false);

    return { el: root, get:()=>_v, set:(v)=>apply(v,false), setAndFire:(v)=>apply(v,true) };
  }

  function createBtn(label, className="", onClick=null){
    const el = document.createElement("div");
    el.className = "btn " + className;
    el.textContent = label;
    if(onClick) el.addEventListener("click", onClick);
    return el;
  }

  // ---------------------------
  // UI Build
  // ---------------------------
  const masterEl = $("#master");
  const app = $("#app");

  const ui = {
    master: {},
    lane: Array.from({length:6}).map(()=>({ ctrl:{}, steps:[] }))
  };

  function buildMaster(){
    masterEl.innerHTML = "";

    // transport
    const startBtn = createBtn("▶", "", () => onStart());
    const stopBtn  = createBtn("■", "danger", () => onStop());
    const rndBtn   = createBtn("R", "warn", () => { randomizeAll(); });
    const status = document.createElement("div");
    status.className = "pill";
    status.textContent = "STOP";

    ui.master.startBtn = startBtn;
    ui.master.stopBtn = stopBtn;
    ui.master.rndBtn = rndBtn;
    ui.master.status = status;

    masterEl.appendChild(startBtn);
    masterEl.appendChild(stopBtn);
    masterEl.appendChild(rndBtn);
    masterEl.appendChild(status);

    // sliders
    ui.master.tempo = createVSlider({
      label:"BPM", min:20, max:300, value: state.tempo, step:1,
      formatter:(v)=>String(Math.round(v))
    }, (v)=>{
      state.tempo = v|0;
      saveState();
      if(audio.ready) audio.setDelay(state.delay, state.tempo);
      if(state.syncMode === "midi-master" && midiClockRunning){
        stopMIDIClockSender();
        startMIDIClockSender();
      }
    });

    ui.master.vol = createVSlider({
      label:"VOL", min:0, max:1, value: state.masterVol, step:0,
      formatter:(v)=>fmtPct(v)
    }, (v)=>{
      state.masterVol = v;
      if(audio.ready) audio.setMasterVol(v);
      saveState();
    });

    ui.master.acc = createVSlider({
      label:"ACC", min:0, max:1, value: state.accentAmt, step:0,
      formatter:(v)=>fmtPct(v)
    }, (v)=>{
      state.accentAmt = v;
      saveState();
    });

    ui.master.delayWet = createVSlider({
      label:"WET", min:0, max:DELAY_WET_MAX, value: state.delay.wet,
      formatter:(v)=>String(Math.round(v*100))
    }, (v)=>{
      state.delay.wet = clamp(v, 0, DELAY_WET_MAX);
      if(audio.ready) audio.setDelay(state.delay, state.tempo);
      saveState();
    });

    ui.master.delayFb = createVSlider({
      label:"FB", min:0, max:DELAY_FB_MAX, value: state.delay.fb,
      formatter:(v)=>String(Math.round(v*100))
    }, (v)=>{
      state.delay.fb = clamp(v, 0, DELAY_FB_MAX);
      if(audio.ready) audio.setDelay(state.delay, state.tempo);
      saveState();
    });

    ui.master.delayDiv = createCycle({
      label:"DLY", value: state.delay.div, options: DELAY_DIVS,
      fmt:(v)=>v === "1" ? "1bar" : v
    }, (v)=>{
      state.delay.div = v;
      if(audio.ready) audio.setDelay(state.delay, state.tempo);
      saveState();
    });

    ui.master.delayFeel = createCycle({
      label:"FEEL", value: state.delay.feel, options: DELAY_FEELS,
      fmt:(v)=>v === "straight" ? "STR" : (v === "dotted" ? "DOT" : "TRI")
    }, (v)=>{
      state.delay.feel = v;
      if(audio.ready) audio.setDelay(state.delay, state.tempo);
      saveState();
    });

    ui.master.sync = createCycle({
      label:"SYNC", value: state.syncMode, options: SYNC_MODES,
      fmt:(v)=>v === "internal" ? "INT" : (v === "midi-master" ? "MST" : "SLV")
    }, (v)=>{
      state.syncMode = v;
      saveState();
      applySyncMode();
    });

    ui.master.mOut = createCycle({
      label:"OUT", value: state.midi.outId || "-", options: ["-"],
      fmt:(v)=> portNameById(v) || "-"
    }, (v)=>{
      state.midi.outId = (v === "-") ? null : v;
      saveState();
      selectMIDIPorts();
    });

    ui.master.mIn = createCycle({
      label:"IN", value: state.midi.inId || "-", options: ["-"],
      fmt:(v)=> portNameById(v) || "-"
    }, (v)=>{
      state.midi.inId = (v === "-") ? null : v;
      saveState();
      selectMIDIPorts();
    });

    masterEl.appendChild(ui.master.tempo.el);
    masterEl.appendChild(ui.master.vol.el);
    masterEl.appendChild(ui.master.acc.el);
    masterEl.appendChild(ui.master.delayDiv.el);
    masterEl.appendChild(ui.master.delayFeel.el);
    masterEl.appendChild(ui.master.delayWet.el);
    masterEl.appendChild(ui.master.delayFb.el);
    masterEl.appendChild(ui.master.sync.el);
    masterEl.appendChild(ui.master.mOut.el);
    masterEl.appendChild(ui.master.mIn.el);
  }

  function buildLanes(){
    app.innerHTML = "";
    ui.lane.forEach((x)=>{ x.ctrl = {}; x.steps = []; });

    state.lanes.forEach((lane, li) => {
      const laneEl = document.createElement("section");
      laneEl.className = "lane";
      laneEl.dataset.lane = li;

      const top = document.createElement("div");
      top.className = "lane-top";

      // lane controls: F Q W D L P DIV
      ui.lane[li].ctrl.f = createVSlider({
        label:"F", min:FREQ_MIN, max:FREQ_MAX, value: lane.f, map:"log",
        formatter:(v)=>fmtHz(v)
      }, (v)=>{
        lane.f = clamp(v, FREQ_MIN, FREQ_MAX);
        if(audio.ready) audio.setLaneFilter(li, lane.f, lane.q, lane.width);
        saveState();
      });

      ui.lane[li].ctrl.q = createVSlider({
        label:"Q", min:0.3, max:30, value: lane.q,
        formatter:(v)=> (v<10 ? v.toFixed(1) : v.toFixed(0))
      }, (v)=>{
        lane.q = clamp(v, 0.3, 30);
        if(audio.ready) audio.setLaneFilter(li, lane.f, lane.q, lane.width);
        saveState();
      });

      ui.lane[li].ctrl.w = createVSlider({
        label:"W", min:0, max:1, value: lane.width,
        formatter:(v)=>fmtPct(v)
      }, (v)=>{
        lane.width = clamp(v, 0, 1);
        if(audio.ready) audio.setLaneFilter(li, lane.f, lane.q, lane.width);
        saveState();
      });

      ui.lane[li].ctrl.d = createVSlider({
        label:"D", min:0.01, max:DECAY_MAX, value: lane.decayMax,
        formatter:(v)=>fmtMs(v)
      }, (v)=>{
        lane.decayMax = clamp(v, 0.01, DECAY_MAX);
        saveState();
      });

      ui.lane[li].ctrl.lvl = createVSlider({
        label:"L", min:0, max:1, value: lane.level,
        formatter:(v)=>fmtPct(v)
      }, (v)=>{
        lane.level = clamp(v, 0, 1);
        if(audio.ready) audio.setLaneLevel(li, lane.level);
        saveState();
      });

      ui.lane[li].ctrl.pan = createVSlider({
        label:"P", min:-1, max:1, value: lane.pan,
        dotOnly:true, showValue:false
      }, (v)=>{
        lane.pan = clamp(v, -1, 1);
        if(audio.ready) audio.setLanePan(li, lane.pan);
        saveState();
      });

      ui.lane[li].ctrl.div = createCycle({
        label:"DIV", value: lane.division, options: DIVS,
        fmt:(v)=> v.replace("1/","/")
      }, (v)=>{
        lane.division = v;
        saveState();
      });

      top.appendChild(ui.lane[li].ctrl.f.el);
      top.appendChild(ui.lane[li].ctrl.q.el);
      top.appendChild(ui.lane[li].ctrl.w.el);
      top.appendChild(ui.lane[li].ctrl.d.el);
      top.appendChild(ui.lane[li].ctrl.lvl.el);
      top.appendChild(ui.lane[li].ctrl.pan.el);
      top.appendChild(ui.lane[li].ctrl.div.el);

      const seqWrap = document.createElement("div");
      seqWrap.className = "seq-wrap";
      const seqEl = document.createElement("div");
      seqEl.className = "seq";
      seqEl.id = `seq${li}`;

      lane.steps.forEach((st, si) => {
        const stepEl = document.createElement("div");
        stepEl.className = "step" + (st.on ? " on" : "");
        stepEl.dataset.step = si;

        const act = document.createElement("div");
        act.className = "act";
        act.addEventListener("click", () => {
          st.on = !st.on;
          stepEl.classList.toggle("on", st.on);
          saveState();
        });

        const set = document.createElement("div");
        set.className = "set";

        const ledAcc = document.createElement("div");
        ledAcc.className = "led acc" + (st.acc ? " on" : "");
        ledAcc.addEventListener("click", (e) => {
          e.stopPropagation();
          st.acc = !st.acc;
          ledAcc.classList.toggle("on", st.acc);
          saveState();
        });

        const ledLast = document.createElement("div");
        ledLast.className = "led last" + (st.last ? " on" : "");
        ledLast.addEventListener("click", (e) => {
          e.stopPropagation();
          const turnOn = !st.last;
          lane.steps.forEach((x)=> x.last = false);
          if(turnOn) st.last = true;
          normalizeLast(lane);
          // update all last leds in lane
          lane.steps.forEach((x, j) => {
            const el = ui.lane[li].steps[j];
            if(!el) return;
            el._ledLast.classList.toggle("on", x.last);
          });
          saveState();
        });

        const rat = document.createElement("div");
        rat.className = "rat";
        function renderRat(){
          rat.innerHTML = "";
          for(let k=1;k<=4;k++){
            const p = document.createElement("div");
            p.className = "pip" + (k <= st.rat ? " on" : "");
            rat.appendChild(p);
          }
        }
        renderRat();
        rat.addEventListener("click", (e) => {
          e.stopPropagation();
          st.rat = (st.rat % 4) + 1;
          renderRat();
          saveState();
        });
        rat.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          e.stopPropagation();
          st.rat = (st.rat + 2) % 4 + 1; // cycle backwards
          renderRat();
          saveState();
        });

        const prob = createVSlider({
          label:"", min:0, max:1, value: st.prob,
          showValue:false, className:"prob"
        }, (v)=>{
          st.prob = clamp(v, 0, 1);
          saveState();
        });

        set.appendChild(ledAcc);
        set.appendChild(ledLast);
        set.appendChild(rat);
        set.appendChild(prob.el);

        stepEl.appendChild(act);
        stepEl.appendChild(set);

        // store references for fast updates
        stepEl._act = act;
        stepEl._ledAcc = ledAcc;
        stepEl._ledLast = ledLast;
        stepEl._ratRender = renderRat;
        stepEl._prob = prob;

        ui.lane[li].steps[si] = stepEl;
        seqEl.appendChild(stepEl);
      });

      seqWrap.appendChild(seqEl);
      laneEl.appendChild(top);
      laneEl.appendChild(seqWrap);
      app.appendChild(laneEl);
    });
  }

  function rebuildUI(){
    buildMaster();
    buildLanes();
    applySyncMode();
    setStatus(playing ? (state.syncMode === "internal" ? "RUN" : (state.syncMode === "midi-master" ? "MST" : "SLV")) : "STOP");
    requestAnimationFrame(refreshPositions);
  }

  function setStatus(text){
    if(ui.master.status) ui.master.status.textContent = text;
  }

  function refreshPositions(){
    const m = ui.master;
    [m.tempo,m.vol,m.acc,m.delayWet,m.delayFb].forEach(x => { if(x) x.set(x.get()); });
    for(let li=0; li<6; li++){
      const c = ui.lane[li].ctrl;
      [c.f,c.q,c.w,c.d,c.lvl,c.pan].forEach(x => { if(x) x.set(x.get()); });
      for(let si=0; si<16; si++){
        const stepEl = ui.lane[li].steps[si];
        if(stepEl && stepEl._prob) stepEl._prob.set(stepEl._prob.get());
      }
    }
  }

  window.addEventListener("resize", () => requestAnimationFrame(refreshPositions));

  // ---------------------------
  // Randomize
  // ---------------------------
  function randChoice(a){ return a[Math.floor(Math.random()*a.length)]; }
  function randRange(a,b){ return a + Math.random()*(b-a); }
  function randLog(min,max){ return normToLog(Math.random(), min, max); }

  function randomizeAll(){
    state.lanes.forEach((lane, li) => {
      lane.division = randChoice(DIVS);
      lane.level = clamp(randRange(0.35, 1.0), 0, 1);
      lane.pan = clamp(randRange(-1, 1), -1, 1);
      lane.f = clamp(randLog(FREQ_MIN, FREQ_MAX), FREQ_MIN, FREQ_MAX);
      lane.q = clamp(randRange(0.7, 22), 0.3, 30);
      lane.width = clamp(randRange(0, 0.8), 0, 1);
      lane.decayMax = clamp(randRange(0.03, DECAY_MAX), 0.01, DECAY_MAX);

      // steps
      lane.steps.forEach((st) => {
        st.on = Math.random() < 0.55;
        st.prob = clamp(Math.pow(Math.random(), 0.35), 0, 1); // bias towards 1
        st.rat = 1 + (Math.random()*4|0);
        st.acc = Math.random() < 0.18;
        st.last = false;
      });

      // random last step (often)
      if(Math.random() < 0.75){
        const idx = 8 + (Math.random()*8|0); // 8..15
        lane.steps[idx].last = true;
      }
      normalizeLast(lane);

      // push to audio if running
      if(audio.ready){
        audio.setLaneLevel(li, lane.level);
        audio.setLanePan(li, lane.pan);
        audio.setLaneFilter(li, lane.f, lane.q, lane.width);
      }
    });

    saveState();
    rebuildUI();
    resetPositions();
    toast("RND");
  }

  // ---------------------------
  // Audio engine
  // ---------------------------
  const audio = (() => {
    let ctx = null;
    let ready = false;

    let masterGain, dry, wet, delay, fbFilter, fbShaper, fbGain;
    let noiseSrc, noiseGain;
    const lanes = [];

    function makeNoiseBuffer(context, seconds=2.5){
      const sr = context.sampleRate;
      const len = Math.floor(seconds * sr);
      const buf = context.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for(let i=0;i<len;i++) data[i] = (Math.random()*2 - 1);
      return buf;
    }

    function makeSoftClipper(context){
      const sh = context.createWaveShaper();
      const n = 2048;
      const curve = new Float32Array(n);
      for(let i=0;i<n;i++){
        const x = (i/(n-1))*2 - 1;
        curve[i] = Math.tanh(2.2*x);
      }
      sh.curve = curve;
      sh.oversample = "2x";
      return sh;
    }

    function initFromState(){
      if(ready) return true;
      ctx = new (window.AudioContext || window.webkitAudioContext)();

      // master
      masterGain = ctx.createGain();
      masterGain.gain.value = state.masterVol;

      dry = ctx.createGain();
      wet = ctx.createGain();
      delay = ctx.createDelay(4.0);

      fbFilter = ctx.createBiquadFilter();
      fbFilter.type = "bandpass";
      fbFilter.frequency.value = 1200;
      fbFilter.Q.value = 0.8;

      fbShaper = makeSoftClipper(ctx);
      fbGain = ctx.createGain();

      // routing: lanes -> dry+wet -> master
      const mix = ctx.createGain();
      mix.gain.value = 1;

      mix.connect(dry);
      mix.connect(delay);
      delay.connect(fbFilter);
      fbFilter.connect(fbShaper);
      fbShaper.connect(fbGain);
      fbGain.connect(delay);

      dry.connect(masterGain);
      wet.connect(masterGain);
      delay.connect(wet);

      masterGain.connect(ctx.destination);

      // noise source
      noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.7;
      noiseSrc = ctx.createBufferSource();
      noiseSrc.buffer = makeNoiseBuffer(ctx, 2.5);
      noiseSrc.loop = true;
      noiseSrc.connect(noiseGain);

      // lanes
      lanes.length = 0;
      for(let i=0;i<6;i++){
        const laneState = state.lanes[i];
        const filters = [];
        for(let k=0;k<4;k++){
          const bp = ctx.createBiquadFilter();
          bp.type = "bandpass";
          bp.Q.value = laneState.q;
          bp.frequency.value = laneState.f;
          filters.push(bp);
        }
        const envGain = ctx.createGain();
        envGain.gain.value = 0.0;

        const levelGain = ctx.createGain();
        levelGain.gain.value = laneState.level;

        const panner = ctx.createStereoPanner();
        panner.pan.value = laneState.pan;

        noiseGain.connect(filters[0]);
        filters[0].connect(filters[1]);
        filters[1].connect(filters[2]);
        filters[2].connect(filters[3]);
        filters[3].connect(envGain);
        envGain.connect(levelGain);
        levelGain.connect(panner);
        panner.connect(mix);

        lanes.push({filters, envGain, levelGain, panner});
        setLaneFilter(i, laneState.f, laneState.q, laneState.width);
      }

      setMasterVol(state.masterVol);
      setDelay(state.delay, state.tempo);

      noiseSrc.start();
      ready = true;
      return true;
    }

    function setMasterVol(v){
      if(!ready) return;
      masterGain.gain.setTargetAtTime(clamp(v,0,1), ctx.currentTime, 0.01);
    }

    function setLaneLevel(i, v){
      if(!ready) return;
      lanes[i].levelGain.gain.setTargetAtTime(clamp(v,0,1), ctx.currentTime, 0.01);
    }

    function setLanePan(i, v){
      if(!ready) return;
      lanes[i].panner.pan.setTargetAtTime(clamp(v,-1,1), ctx.currentTime, 0.01);
    }

    function setLaneFilter(i, freq, q, width){
      if(!ready) return;
      const chain = lanes[i].filters;
      const spread = clamp(width,0,1) * 0.22; // +/- 22% around center
      const offsets = [-1.0, -0.33, 0.33, 1.0].map(x => x * spread);
      for(let k=0;k<4;k++){
        const f = clamp(freq * (1 + offsets[k]), FREQ_MIN, FREQ_MAX);
        chain[k].frequency.setTargetAtTime(f, ctx.currentTime, 0.01);
        chain[k].Q.setTargetAtTime(clamp(q,0.3,30), ctx.currentTime, 0.01);
      }
    }

    function setDelay(d, bpm){
      if(!ready) return;
      const quarter = 60 / clamp(bpm,20,300);
      let base = quarter;
      switch(d.div){
        case "1/16": base = quarter/4; break;
        case "1/8":  base = quarter/2; break;
        case "1/4":  base = quarter; break;
        case "1/2":  base = quarter*2; break;
        case "1":    base = quarter*4; break;
      }
      let factor = 1;
      if(d.feel === "dotted") factor = 1.5;
      else if(d.feel === "triplet") factor = 2/3;

      const t = clamp(base * factor, 0.01, 3.9);
      delay.delayTime.setTargetAtTime(t, ctx.currentTime, 0.01);

      const wetAmt = clamp(d.wet, 0, DELAY_WET_MAX);
      dry.gain.setTargetAtTime(1 - wetAmt, ctx.currentTime, 0.01);
      wet.gain.setTargetAtTime(wetAmt, ctx.currentTime, 0.01);
      fbGain.gain.setTargetAtTime(clamp(d.fb, 0, DELAY_FB_MAX), ctx.currentTime, 0.02);
    }

    function triggerLane(laneIndex, time, amp=1.0, decayTime=0.15){
      if(!ready) return;
      const g = lanes[laneIndex].envGain.gain;
      const t0 = time;
      const attack = 0.002;
      const floor = 0.0008;
      const dt = clamp(decayTime, 0.005, DECAY_MAX);
      g.cancelScheduledValues(t0);
      g.setValueAtTime(0.0, t0);
      g.linearRampToValueAtTime(clamp(amp,0,1.6), t0 + attack);
      g.exponentialRampToValueAtTime(floor, t0 + attack + dt);
      g.setValueAtTime(0.0, t0 + attack + dt + 0.01);
    }

    function suspendOrResume(){
      if(!ctx) return;
      if(ctx.state === "suspended") ctx.resume();
    }

    function panicSilence(){
      if(!ready) return;
      const t = ctx.currentTime;
      lanes.forEach(l => {
        l.envGain.gain.cancelScheduledValues(t);
        l.envGain.gain.setValueAtTime(0.0, t);
      });
    }

    return {
      get ctx(){ return ctx; },
      get ready(){ return ready; },
      initFromState,
      setMasterVol,
      setLaneLevel,
      setLanePan,
      setLaneFilter,
      setDelay,
      triggerLane,
      suspendOrResume,
      panicSilence
    };
  })();

  // ---------------------------
  // Sequencer / Transport
  // ---------------------------
  let playing = false;
  const seq = {
    lookahead: 0.025,
    scheduleAhead: 0.12,
    timer: null,
    lanePos: Array(6).fill(0),
    laneNextTime: Array(6).fill(0)
  };

  function stepSecondsForDivision(division, bpm){
    const quarter = 60 / clamp(bpm,20,300);
    switch(division){
      case "1/32": return quarter / 8;
      case "1/16": return quarter / 4;
      case "1/8":  return quarter / 2;
      case "1/4":  return quarter;
      default: return quarter/4;
    }
  }

  function laneLoopLength(lane){
    const idx = lane.steps.findIndex(s => s.last);
    return idx >= 0 ? (idx + 1) : 16;
  }

  function resetPositions(){
    for(let i=0;i<6;i++){
      seq.lanePos[i] = 0;
      seq.laneNextTime[i] = audio.ctx ? audio.ctx.currentTime : 0;
      updateLaneCursor(i);
    }
  }

  function clearAllCursors(){
    for(let li=0;li<6;li++){
      const s = document.getElementById(`seq${li}`);
      if(!s) continue;
      [...s.children].forEach(el => el.classList.remove("cursor"));
    }
  }

  function updateLaneCursor(laneIndex){
    const s = document.getElementById(`seq${laneIndex}`);
    if(!s) return;
    const pos = seq.lanePos[laneIndex] | 0;
    [...s.children].forEach((el, j) => el.classList.toggle("cursor", j===pos));
  }

  function blinkHit(laneIndex, stepIndex){
    const stepEl = ui.lane[laneIndex].steps[stepIndex];
    if(!stepEl) return;
    const act = stepEl._act;
    act.classList.remove("hit");
    void act.offsetWidth;
    act.classList.add("hit");
  }

  function scheduleLaneStep(laneIndex, time){
    const lane = state.lanes[laneIndex];
    const stepIndex = seq.lanePos[laneIndex] | 0;
    const st = lane.steps[stepIndex];
    const bpm = state.tempo;
    const stepDur = stepSecondsForDivision(lane.division, bpm);

    setTimeout(() => {
      if(playing) updateLaneCursor(laneIndex);
    }, Math.max(0, (time - audio.ctx.currentTime)*1000 - 10));

    if(st.on && Math.random() <= st.prob){
      const rat = clamp(st.rat|0, 1, 4);
      const decayT = clamp(lane.decayMax, 0.01, DECAY_MAX);

      for(let r=0;r<rat;r++){
        const t = time + (r * (stepDur/rat));
        const accBoost = 1 + (st.acc ? (state.accentAmt * 0.9) : 0);
        const amp = clamp(0.9 * accBoost, 0, 1.35);
        audio.triggerLane(laneIndex, t, amp, decayT);

        setTimeout(() => {
          if(playing) blinkHit(laneIndex, stepIndex);
        }, Math.max(0, (t - audio.ctx.currentTime)*1000));
      }
    }

    const loopLen = laneLoopLength(lane);
    let nextPos = stepIndex + 1;
    if(nextPos >= loopLen) nextPos = 0;
    seq.lanePos[laneIndex] = nextPos;
    seq.laneNextTime[laneIndex] += stepDur;
  }

  function schedulerTick(){
    if(!playing || !audio.ready) return;
    const ct = audio.ctx.currentTime;
    for(let i=0;i<6;i++){
      while(seq.laneNextTime[i] < ct + seq.scheduleAhead){
        scheduleLaneStep(i, seq.laneNextTime[i]);
      }
    }
  }

  function startInternal(){
    if(playing) return;
    if(!audio.ready){
      audio.initFromState();
      state.lanes.forEach((l, i) => {
        audio.setLaneLevel(i, l.level);
        audio.setLanePan(i, l.pan);
        audio.setLaneFilter(i, l.f, l.q, l.width);
      });
    }
    audio.suspendOrResume();
    playing = true;
    setStatus(state.syncMode === "internal" ? "RUN" : "MST");
    clearAllCursors();

    const t = audio.ctx.currentTime + 0.05;
    for(let i=0;i<6;i++){
      seq.lanePos[i] = 0;
      seq.laneNextTime[i] = t;
      updateLaneCursor(i);
    }
    seq.timer = setInterval(schedulerTick, seq.lookahead*1000);
  }

  function stopAll(){
    if(!playing) return;
    playing = false;
    setStatus("STOP");
    clearInterval(seq.timer);
    seq.timer = null;
    audio.panicSilence();
    resetPositions();
    clearAllCursors();
  }

  // ---------------------------
  // MIDI Sync
  // ---------------------------
  let midiAccess = null;
  let midiIn = null;
  let midiOut = null;

  const midiPorts = { outs: [], ins: [] };

  let midiClockRunning = false;
  let midiClockTimer = null;
  let nextClockAt = 0;

  // slave clock receive
  let lastClockMs = 0;
  let bpmEst = state.tempo;
  let tickCount = 0;
  let slaveRunning = false;

  function supportsMIDI(){
    return !!navigator.requestMIDIAccess;
  }

  function portNameById(id){
    if(id === "-") return "-";
    const o = midiPorts.outs.find(x => x.id === id);
    if(o) return (o.name || o.manufacturer || "OUT").slice(0, 10);
    const i = midiPorts.ins.find(x => x.id === id);
    if(i) return (i.name || i.manufacturer || "IN").slice(0, 10);
    return "-";
  }

  async function initMIDI(){
    if(!supportsMIDI()) return;
    try{
      midiAccess = await navigator.requestMIDIAccess({sysex:false});
      refreshMIDIPorts();
      midiAccess.onstatechange = refreshMIDIPorts;
    }catch(e){
      console.warn(e);
      toast("MIDI DENY");
    }
  }

  function refreshMIDIPorts(){
    if(!midiAccess) return;
    midiPorts.outs = [...midiAccess.outputs.values()];
    midiPorts.ins  = [...midiAccess.inputs.values()];

    // rebuild cycle options
    const outOpts = ["-", ...midiPorts.outs.map(o => o.id)];
    const inOpts  = ["-", ...midiPorts.ins.map(i => i.id)];

    const outVal = (state.midi.outId && midiPorts.outs.some(o=>o.id===state.midi.outId)) ? state.midi.outId : "-";
    const inVal  = (state.midi.inId  && midiPorts.ins.some(i=>i.id===state.midi.inId))  ? state.midi.inId  : "-";

    ui.master.mOut = ui.master.mOut || null;
    ui.master.mIn  = ui.master.mIn  || null;

    if(ui.master.mOut){
      ui.master.mOut.set(outVal);
      // hack: swap its options by rebuilding the element is heavy, so we store on element
      ui.master.mOutOptions = outOpts;
    }
    if(ui.master.mIn){
      ui.master.mIn.set(inVal);
      ui.master.mInOptions = inOpts;
    }

    // Also update the internal cycle handlers to use the new arrays
    // We do this by monkeypatching the get/setAndFire via wrappers when building master.

    selectMIDIPorts();
  }

  function selectMIDIPorts(){
    if(!midiAccess) return;

    if(midiOut){ try{ midiOut.close?.(); }catch(e){} }
    midiOut = null;

    if(midiIn){
      midiIn.onmidimessage = null;
      try{ midiIn.close?.(); }catch(e){}
    }
    midiIn = null;

    const outId = state.midi.outId;
    const inId  = state.midi.inId;

    if(outId && midiAccess.outputs.has(outId)){
      midiOut = midiAccess.outputs.get(outId);
    }
    if(inId && midiAccess.inputs.has(inId)){
      midiIn = midiAccess.inputs.get(inId);
      midiIn.onmidimessage = onMIDIMessage;
    }
  }

  function sendMIDI(bytes){
    if(!midiOut) return;
    try{ midiOut.send(bytes); }catch(e){}
  }

  function startMIDIClockSender(){
    if(!midiOut){ toast("NO OUT"); return; }
    midiClockRunning = true;
    nextClockAt = nowMs();
    const tickMs = (60*1000)/(state.tempo*24);
    sendMIDI([0xFA]);
    function loop(){
      if(!midiClockRunning) return;
      const t = nowMs();
      if(t >= nextClockAt){
        sendMIDI([0xF8]);
        nextClockAt += tickMs;
      }
      midiClockTimer = setTimeout(loop, 1);
    }
    loop();
  }

  function stopMIDIClockSender(){
    if(!midiClockRunning) return;
    midiClockRunning = false;
    clearTimeout(midiClockTimer);
    midiClockTimer = null;
    sendMIDI([0xFC]);
  }

  function onMIDIMessage(e){
    const [status] = e.data;
    const t = nowMs();

    if(status === 0xFA){
      slaveRunning = true;
      tickCount = 0;
      lastClockMs = 0;
      if(!audio.ready) audio.initFromState();
      audio.suspendOrResume();
      playing = true;
      setStatus("SLV");
      clearAllCursors();
      const at = audio.ctx.currentTime + 0.02;
      for(let i=0;i<6;i++){
        seq.lanePos[i] = 0;
        seq.laneNextTime[i] = at;
        updateLaneCursor(i);
      }
      return;
    }

    if(status === 0xFC){
      slaveRunning = false;
      stopAll();
      return;
    }

    if(status === 0xF8){
      if(!slaveRunning) return;
      if(lastClockMs){
        const dt = (t - lastClockMs) / 1000;
        const instBpm = 60 / (dt * 24);
        if(isFinite(instBpm)){
          bpmEst = lerp(bpmEst, instBpm, 0.12);
          bpmEst = clamp(bpmEst, 20, 300);
        }
      }
      lastClockMs = t;
      tickCount++;

      const ticksPer = { "1/32": 3, "1/16": 6, "1/8": 12, "1/4": 24 };
      const audioNow = audio.ctx.currentTime;
      for(let li=0; li<6; li++){
        const div = state.lanes[li].division;
        const n = ticksPer[div] || 6;
        if(tickCount % n === 0){
          const stepDur = stepSecondsForDivision(div, bpmEst);
          const schedTime = audioNow + 0.002;
          const savedTempo = state.tempo;
          state.tempo = bpmEst;
          scheduleLaneStep(li, schedTime);
          state.tempo = savedTempo;
          seq.laneNextTime[li] = schedTime + stepDur;
        }
      }
    }
  }

  // ---------------------------
  // Sync mode + transport hooks
  // ---------------------------
  function applySyncMode(){
    // show midi controls only when relevant
    const showOut = state.syncMode === "midi-master";
    const showIn  = state.syncMode === "midi-slave";
    ui.master.mOut.el.style.display = showOut ? "" : "none";
    ui.master.mIn.el.style.display  = showIn  ? "" : "none";

    if(state.syncMode === "internal"){
      stopMIDIClockSender();
      slaveRunning = false;
      setStatus(playing ? "RUN" : "STOP");
    }else if(state.syncMode === "midi-master"){
      slaveRunning = false;
      setStatus(playing ? "MST" : "STOP");
    }else if(state.syncMode === "midi-slave"){
      stopMIDIClockSender();
      setStatus("WAIT");
    }
  }

  async function onStart(){
    if(!audio.ready) audio.initFromState();
    audio.suspendOrResume();

    if(state.syncMode === "internal"){
      startInternal();
    }else if(state.syncMode === "midi-master"){
      startInternal();
      startMIDIClockSender();
      setStatus("MST");
    }else{
      if(!supportsMIDI()){ toast("NO MIDI"); return; }
      if(!midiIn){ toast("NO IN"); return; }
      playing = false;
      slaveRunning = false;
      resetPositions();
      clearAllCursors();
      setStatus("WAIT");
    }
  }

  function onStop(){
    if(state.syncMode === "midi-master") stopMIDIClockSender();
    stopAll();
    if(state.syncMode === "midi-slave"){
      slaveRunning = false;
      setStatus("STOP");
    }
  }

  // ---------------------------
  // Patch: MIDI cycle options
  // ---------------------------
  function wireMIDICycleOptions(){
    // We want cycle controls (no <select>), but options are dynamic.
    // This is a tiny hack: rebind click/contextmenu on the cycle track.

    function patchCycle(cycleObj, getOpts, setId){
      const track = cycleObj.el.querySelector('.track');
      track.onclick = null;
      track.oncontextmenu = null;

      function cycle(dir){
        const opts = getOpts();
        const cur = cycleObj.get();
        const i = opts.indexOf(cur);
        const ni = (i + dir + opts.length) % opts.length;
        const v = opts[ni];
        cycleObj.set(v);
        setId(v);
      }

      track.addEventListener('click', () => cycle(1));
      track.addEventListener('contextmenu', (e) => { e.preventDefault(); cycle(-1); });
    }

    patchCycle(ui.master.mOut, () => ui.master.mOutOptions || ['-'], (v)=>{
      state.midi.outId = (v === '-') ? null : v;
      saveState();
      selectMIDIPorts();
    });

    patchCycle(ui.master.mIn, () => ui.master.mInOptions || ['-'], (v)=>{
      state.midi.inId = (v === '-') ? null : v;
      saveState();
      selectMIDIPorts();
    });
  }

  // ---------------------------
  // Init
  // ---------------------------
  rebuildUI();
  wireMIDICycleOptions();

  initMIDI().then(() => {
    refreshMIDIPorts();
    wireMIDICycleOptions();
    applySyncMode();
  });

})();
</script>
</body>
</html>
