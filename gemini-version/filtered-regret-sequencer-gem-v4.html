<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOISE_DRUM_COMMAND_V3</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1e1e1e; --accent: #00ffcc; --text: #d1d1d1; }
        body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; padding: 10px; font-size: 11px; }
        
        #master-strip { display: flex; gap: 15px; background: #222; padding: 10px; border-bottom: 2px solid #444; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        .lane { background: var(--panel); border: 1px solid #333; margin-bottom: 10px; padding: 8px; border-radius: 4px; }
        
        .step-container { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; margin-top: 8px; }
        .step-block { background: #252525; padding: 4px; border: 1px solid #333; display: flex; flex-direction: column; gap: 4px; }
        .step-block.on { background: #333; border-color: #555; }
        .step-block.hit { background: var(--accent) !important; }
        
        .control-unit { display: flex; flex-direction: column; min-width: 50px; }
        input[type=range] { width: 100%; height: 3px; appearance: none; background: #444; accent-color: var(--accent); }
        
        button { background: #333; color: white; border: 1px solid #555; padding: 4px; cursor: pointer; font-size: 10px; }
        button.active { background: var(--accent); color: black; }
        .btn-main { padding: 8px 12px; font-weight: bold; border-color: var(--accent); }
        
        label { font-size: 9px; color: #888; text-transform: uppercase; }
        .lane-title { font-weight: bold; color: var(--accent); margin-right: 10px; }
        @media (max-width: 1000px) { .step-container { grid-template-columns: repeat(8, 1fr); } }
    </style>
</head>
<body>

    <div id="master-strip">
        <span class="lane-title">MASTER</span>
        <button id="play-btn" class="btn-main">START</button>
        <button id="stop-btn" class="btn-main">STOP</button>
        <button id="rand-btn" style="background:#442244;">RANDOM</button>
        <button id="midi-btn">MIDI SLAVE: OFF</button>
        
        <div class="control-unit"><label>BPM</label><input type="range" id="m-tempo" min="20" max="300" value="120"><span id="v-tempo">120</span></div>
        <div class="control-unit"><label>ACCENT</label><input type="range" id="m-accent" min="1" max="2" step="0.1" value="1.5"></div>
        
        <div style="width:2px; height:30px; background:#444;"></div>
        
        <div class="control-unit"><label>D-MIX</label><input type="range" id="d-mix" min="0" max="1" step="0.01" value="0.2"></div>
        <div class="control-unit"><label>D-FB</label><input type="range" id="d-fb" min="0" max="0.5" step="0.01" value="0.25"></div>
        <div class="control-unit">
            <label>D-TIME</label>
            <select id="d-time" style="background:#333; color:white; font-size:10px;">
                <option value="0.75">DOTTED</option>
                <option value="0.5" selected>8TH</option>
                <option value="0.333">TRIPLET</option>
                <option value="0.25">16TH</option>
            </select>
        </div>
    </div>

    <div id="lanes-container"></div>

<script>
/** DSP DRUM MACHINE V3 - WIZARD EDITION **/

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterBus = audioCtx.createGain();

// --- DELAY ENGINE (50% Feedback Cap) ---
const delayNode = audioCtx.createDelay(2.0);
const delayGain = audioCtx.createGain();
const delayFB = audioCtx.createGain();
const delayFilter = audioCtx.createBiquadFilter();
delayFilter.type = 'bandpass'; delayFilter.frequency.value = 1100;

masterBus.connect(delayNode);
delayNode.connect(delayFilter);
delayFilter.connect(delayFB);
delayFB.connect(delayNode);
delayNode.connect(delayGain);

const finalOut = audioCtx.createGain();
masterBus.connect(finalOut);
delayGain.connect(finalOut);
finalOut.connect(audioCtx.destination);

// --- NOISE ---
const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
const nData = noiseBuffer.getChannelData(0);
for (let i = 0; i < nData.length; i++) nData[i] = Math.random() * 2 - 1;

// --- STATE & MIDI ---
let isPlaying = false;
let isMidiSlave = false;
let tempo = 120;
let nextStepTime = 0.0;
let masterTick = 0;
let midiTickCounter = 0;
const lanes = [];

function createLane(id) {
    const l = {
        id,
        steps: Array.from({length: 16}, () => ({ on: false, decay: 0.8, prob: 1.0, ratchet: 1, last: false, accent: false })),
        freq: 300 + (id * 900), q: 12, masterDecay: 0.5, pan: 0, level: 0.6, division: 1,
        filters: [], currentStep: 0
    };
    const panner = audioCtx.createStereoPanner();
    const lGain = audioCtx.createGain();
    for(let i=0; i<4; i++) {
        let f = audioCtx.createBiquadFilter(); f.type = 'bandpass';
        if(i > 0) l.filters[i-1].connect(f); l.filters.push(f);
    }
    l.filters[3].connect(lGain); lGain.connect(panner); panner.connect(masterBus);
    l.gainNode = lGain; l.pannerNode = panner;
    return l;
}

for(let i=0; i<6; i++) lanes.push(createLane(i));

function trigger(lane, step, time) {
    if(!step.on || Math.random() > step.prob) return;
    const rCount = parseInt(step.ratchet);
    const stepDur = ((60/tempo)/4) * lane.division;
    const subDur = stepDur / rCount;
    const gainBase = lane.level * (step.accent ? document.getElementById('m-accent').value : 1.0);

    for(let r=0; r<rCount; r++) {
        const sTime = time + (r * subDur);
        const src = audioCtx.createBufferSource(); src.buffer = noiseBuffer; src.loop = true;
        const env = audioCtx.createGain();
        const d = (lane.masterDecay * step.decay) / Math.sqrt(rCount);
        env.gain.setValueAtTime(0.0001, sTime);
        env.gain.exponentialRampToValueAtTime(gainBase, sTime + 0.004);
        env.gain.exponentialRampToValueAtTime(0.0001, sTime + d);
        src.connect(env); env.connect(lane.filters[0]);
        src.start(sTime); src.stop(sTime + d + 0.1);
    }
    const el = document.getElementById(`l${lane.id}s${lane.currentStep}`);
    if(el) { el.classList.add('hit'); setTimeout(() => el.classList.remove('hit'), 50); }
}

function scheduler() {
    if(isMidiSlave) return; // Exit if MIDI is driving
    while (nextStepTime < audioCtx.currentTime + 0.1) {
        tick();
        nextStepTime += (60 / tempo) / 4;
    }
    if(isPlaying) setTimeout(scheduler, 25);
}

function tick() {
    lanes.forEach(lane => {
        if (masterTick % lane.division === 0) {
            trigger(lane, lane.steps[lane.currentStep], isMidiSlave ? audioCtx.currentTime : nextStepTime);
            let reset = lane.steps[lane.currentStep].last;
            lane.currentStep++;
            if(lane.currentStep >= 16 || reset) lane.currentStep = 0;
        }
    });
    masterTick++;
}

// --- MIDI LOGIC ---
if (navigator.requestMIDIAccess) {
    navigator.requestMIDIAccess().then(midi => {
        for (let input of midi.inputs.values()) {
            input.onmidimessage = (msg) => {
                if (!isMidiSlave) return;
                const b = msg.data[0];
                if (b === 0xFA) { isPlaying = true; masterTick = 0; midiTickCounter = 0; } // Start
                if (b === 0xFC) { isPlaying = false; } // Stop
                if (b === 0xF8 && isPlaying) { // Clock
                    midiTickCounter++;
                    if (midiTickCounter % 6 === 0) tick(); 
                }
            };
        }
    });
}

// --- UI HELPERS ---
const container = document.getElementById('lanes-container');
lanes.forEach((l, lIdx) => {
    const div = document.createElement('div');
    div.className = 'lane';
    div.innerHTML = `
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:5px;">
            <span class="lane-title">L${lIdx+1}</span>
            <div class="control-unit"><label>F</label><input type="range" class="p-freq" data-l="${lIdx}" min="50" max="10000" value="${l.freq}"></div>
            <div class="control-unit"><label>Q</label><input type="range" class="p-q" data-l="${lIdx}" min="1" max="50" value="${l.q}"></div>
            <div class="control-unit"><label>DEC</label><input type="range" class="p-mdec" data-l="${lIdx}" min="0.05" max="4" step="0.01" value="${l.masterDecay}"></div>
            <div class="control-unit"><label>PAN</label><input type="range" class="p-pan" data-l="${lIdx}" min="-1" max="1" step="0.1" value="0"></div>
            <div class="control-unit"><label>SPD</label>
                <select class="p-div" data-l="${lIdx}" style="background:#333; color:white; font-size:9px;">
                    <option value="1">1/16</option><option value="2">1/8</option><option value="4">1/4</option>
                </select>
            </div>
        </div>
        <div class="step-container"></div>
    `;
    container.appendChild(div);
    const grid = div.querySelector('.step-container');
    l.steps.forEach((step, sIdx) => {
        const sBlock = document.createElement('div');
        sBlock.className = 'step-block';
        sBlock.id = `l${lIdx}s${sIdx}`;
        sBlock.innerHTML = `
            <button style="height:10px;" onclick="toggleStep(${lIdx}, ${sIdx}, this)"></button>
            <input type="range" class="s-dec" oninput="lanes[${lIdx}].steps[${sIdx}].decay = this.value" min="0.01" max="1" step="0.01" value="0.8">
            <input type="range" class="s-prob" oninput="lanes[${lIdx}].steps[${sIdx}].prob = this.value" min="0" max="1" step="0.01" value="1">
            <input type="range" class="s-rat" oninput="lanes[${lIdx}].steps[${sIdx}].ratchet = this.value" min="1" max="4" step="1" value="1">
            <div style="display:flex; gap:2px;">
                <button class="s-acc" onclick="this.classList.toggle('active'); lanes[${lIdx}].steps[${sIdx}].accent = !lanes[${lIdx}].steps[${sIdx}].accent">A</button>
                <button class="s-lst" onclick="this.classList.toggle('active'); lanes[${lIdx}].steps[${sIdx}].last = !lanes[${lIdx}].steps[${sIdx}].last">L</button>
            </div>
        `;
        grid.appendChild(sBlock);
    });
});

function toggleStep(l, s, el) { 
    lanes[l].steps[s].on = !lanes[l].steps[s].on; 
    document.getElementById(`l${l}s${s}`).classList.toggle('on', lanes[l].steps[s].on);
}

// --- CONTROLS ---
document.getElementById('play-btn').onclick = () => { isPlaying = true; nextStepTime = audioCtx.currentTime; scheduler(); };
document.getElementById('stop-btn').onclick = () => { isPlaying = false; lanes.forEach(l => l.currentStep = 0); };
document.getElementById('m-tempo').oninput = (e) => { tempo = e.target.value; document.getElementById('v-tempo').innerText = tempo; updateDelay(); };
document.getElementById('midi-btn').onclick = (e) => {
    isMidiSlave = !isMidiSlave;
    e.target.innerText = isMidiSlave ? "MIDI SLAVE: ON" : "MIDI SLAVE: OFF";
    e.target.classList.toggle('active', isMidiSlave);
};

document.getElementById('rand-btn').onclick = () => {
    lanes.forEach((l, lIdx) => {
        l.freq = 100 + Math.random() * 5000;
        l.q = 5 + Math.random() * 30;
        l.filters.forEach(f => { f.frequency.value = l.freq; f.Q.value = l.q; });
        l.steps.forEach((s, sIdx) => {
            s.on = Math.random() > 0.7;
            s.decay = 0.2 + Math.random() * 0.8;
            s.ratchet = Math.random() > 0.8 ? Math.floor(Math.random() * 3) + 1 : 1;
            // Update UI
            const el = document.getElementById(`l${lIdx}s${sIdx}`);
            el.classList.toggle('on', s.on);
            el.querySelector('.s-dec').value = s.decay;
            el.querySelector('.s-rat').value = s.ratchet;
        });
    });
};

function updateDelay() {
    delayNode.delayTime.setTargetAtTime((60 / tempo) * parseFloat(document.getElementById('d-time').value), audioCtx.currentTime, 0.1);
    delayFB.gain.value = document.getElementById('d-fb').value;
    delayGain.gain.value = document.getElementById('d-mix').value;
}
document.getElementById('d-mix').oninput = updateDelay;
document.getElementById('d-fb').oninput = updateDelay;
document.getElementById('d-time').onchange = updateDelay;

document.querySelectorAll('.p-freq').forEach(el => el.oninput = (e) => {
    lanes[e.target.dataset.l].filters.forEach(f => f.frequency.value = e.target.value);
});
document.querySelectorAll('.p-pan').forEach(el => el.oninput = (e) => {
    lanes[e.target.dataset.l].pannerNode.pan.value = e.target.value;
});
document.querySelectorAll('.p-div').forEach(el => el.onchange = (e) => {
    lanes[e.target.dataset.l].division = parseInt(e.target.value);
});
</script>
</body>
</html>
