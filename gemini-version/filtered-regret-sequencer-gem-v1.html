<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOISE_DRUM_v1</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2a2a2a; --accent: #00ff95; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; padding: 20px; user-select: none; }
        
        /* Layout */
        #master-controls { display: flex; gap: 20px; background: var(--panel); padding: 15px; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap; border: 1px solid #444; }
        .lane { background: #222; margin-bottom: 15px; padding: 10px; border-radius: 4px; border-left: 4px solid var(--accent); }
        .lane-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; }
        
        /* Sequencer Grid */
        .step-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; }
        @media (max-width: 800px) { .step-grid { grid-template-columns: repeat(8, 1fr); } }
        @media (max-width: 450px) { .step-grid { grid-template-columns: repeat(4, 1fr); } }

        .step { aspect-ratio: 1/1; background: #333; border: 1px solid #444; position: relative; cursor: pointer; transition: transform 0.1s; }
        .step.active { background: #555; border-color: var(--accent); }
        .step.playing { background: var(--accent) !important; box-shadow: 0 0 10px var(--accent); }
        .step-indicator { position: absolute; bottom: 2px; right: 2px; width: 4px; height: 4px; border-radius: 50%; background: #666; }
        .step.accented .step-indicator { background: yellow; box-shadow: 0 0 5px yellow; }

        /* Zoom Overlay */
        #zoom-overlay { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #333; padding: 20px; border: 2px solid var(--accent); z-index: 100; width: 280px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .overlay-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
        
        /* Controls */
        input[type=range] { width: 100%; accent-color: var(--accent); }
        label { display: block; font-size: 0.7rem; color: #888; margin-top: 5px; }
        button { background: #444; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 3px; }
        button.active { background: var(--accent); color: #000; }
        .knob-group { display: flex; gap: 10px; }
        .knob { width: 40px; text-align: center; }
    </style>
</head>
<body>

    <div id="master-controls">
        <div>
            <button id="play-btn">START</button>
            <button id="stop-btn">STOP</button>
        </div>
        <div>
            <label>TEMPO</label>
            <input type="range" id="tempo" min="20" max="300" value="120">
            <span id="tempo-val">120 BPM</span>
        </div>
        <div>
            <label>MASTER VOL</label>
            <input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.7">
        </div>
        <div>
            <label>SYNC</label>
            <button id="midi-sync">INT</button>
        </div>
    </div>

    <div id="lanes-container"></div>

    <div class="overlay-backdrop" id="backdrop"></div>
    <div id="zoom-overlay">
        <h3 id="zoom-title">STEP SETTINGS</h3>
        <label>DECAY %</label>
        <input type="range" id="step-decay" min="0.01" max="1" step="0.01">
        <label>PROBABILITY</label>
        <input type="range" id="step-prob" min="0" max="1" step="0.01">
        <label>RATCHET (1-4)</label>
        <input type="range" id="step-ratchet" min="1" max="4" step="1">
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button id="step-accent-btn">ACCENT</button>
            <button id="step-last-btn">LAST STEP</button>
        </div>
        <button id="close-zoom" style="margin-top:20px; width:100%; background: #666;">CLOSE</button>
    </div>

<script>
/** * DSP WIZARD ENGINE 
 * Chaining 4 Biquads for 48dB slope 
 **/

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);

// Generate White Noise Buffer
const bufferSize = 2 * audioCtx.sampleRate;
const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
const output = noiseBuffer.getChannelData(0);
for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }

// Sequencer State
let isPlaying = false;
let tempo = 120;
let currentStep = 0;
let nextStepTime = 0.0;
const lookahead = 25.0; // ms
const scheduleAheadTime = 0.1; // seconds

// Lane Data
const lanes = [];
const numLanes = 6;

function createLane(id) {
    const lane = {
        id: id,
        active: true,
        steps: Array.from({length: 16}, () => ({
            on: false, decay: 1.0, prob: 1.0, ratchet: 1, accent: false, last: false
        })),
        freq: 1000 + (id * 500),
        q: 10,
        masterDecay: 0.5,
        pan: 0,
        vol: 0.5,
        filters: [] // Will hold the 4 cascaded filters
    };
    
    // Build Filter Chain (4-pole / 48dB)
    let panner = audioCtx.createPanner();
    panner.panningModel = 'equalpower';
    
    let laneGain = audioCtx.createGain();
    
    for(let i=0; i<4; i++) {
        let f = audioCtx.createBiquadFilter();
        f.type = 'bandpass';
        f.frequency.value = lane.freq;
        f.Q.value = lane.q;
        if(i > 0) lane.filters[i-1].connect(f);
        lane.filters.push(f);
    }
    
    lane.filters[3].connect(laneGain);
    laneGain.connect(panner);
    panner.connect(masterGain);
    
    lane.gainNode = laneGain;
    lane.pannerNode = panner;
    return lane;
}

// Initializing Lanes
for(let i=0; i<numLanes; i++) lanes.push(createLane(i));

function triggerStep(lane, step, time) {
    if (!step.on || Math.random() > step.prob) return;

    const ratchetCount = parseInt(step.ratchet);
    const stepDuration = (60 / tempo) / 4; // 16th note duration
    const subStepDuration = stepDuration / ratchetCount;
    
    // Global Accent multiplier
    const accentLevel = step.accent ? 1.5 : 1.0; 
    const finalGain = lane.vol * accentLevel;

    for (let r = 0; r < ratchetCount; r++) {
        const startTime = time + (r * subStepDuration);
        
        // Use a fresh noise source for each trigger to allow overlap if decay is long
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;
        noise.loop = true;
        
        const env = audioCtx.createGain();
        const d = (lane.masterDecay * step.decay) / ratchetCount; // Shorten if ratcheting
        
        env.gain.setValueAtTime(0.0001, startTime);
        env.gain.exponentialRampToValueAtTime(finalGain, startTime + 0.005);
        env.gain.exponentialRampToValueAtTime(0.0001, startTime + d);
        
        noise.connect(env);
        env.connect(lane.filters[0]);
        
        noise.start(startTime);
        noise.stop(startTime + d + 0.1);
    }
    
    // Visual Feedback
    const stepEl = document.querySelector(`#lane-${lane.id}-step-${currentStep}`);
    if(stepEl) {
        stepEl.classList.add('playing');
        setTimeout(() => stepEl.classList.remove('playing'), 100);
    }
}

function scheduler() {
    while (nextStepTime < audioCtx.currentTime + scheduleAheadTime) {
        lanes.forEach(lane => {
            triggerStep(lane, lane.steps[currentStep], nextStepTime);
        });
        advanceStep();
    }
    if(isPlaying) setTimeout(scheduler, lookahead);
}

function advanceStep() {
    const secondsPerStep = (60 / tempo) / 4;
    nextStepTime += secondsPerStep;
    
    // Check for "Last Step" markers
    let forcedReset = false;
    lanes.forEach(l => { if(l.steps[currentStep].last) forcedReset = true; });

    currentStep++;
    if (currentStep >= 16 || forcedReset) currentStep = 0;
}

// --- UI GENERATION & EVENTS ---

const container = document.getElementById('lanes-container');
lanes.forEach((lane, lIdx) => {
    const laneDiv = document.createElement('div');
    laneDiv.className = 'lane';
    laneDiv.innerHTML = `
        <div class="lane-header">
            <span>LANE ${lIdx + 1}</span>
            <div class="knob-group">
                <div class="knob"><label>FREQ</label><input type="range" class="lane-freq" data-lane="${lIdx}" min="100" max="8000" value="${lane.freq}"></div>
                <div class="knob"><label>Q</label><input type="range" class="lane-q" data-lane="${lIdx}" min="1" max="50" value="${lane.q}"></div>
                <div class="knob"><label>DEC</label><input type="range" class="lane-decay" data-lane="${lIdx}" min="0.05" max="2" step="0.01" value="${lane.masterDecay}"></div>
            </div>
        </div>
        <div class="step-grid" id="grid-${lIdx}"></div>
    `;
    container.appendChild(laneDiv);

    const grid = laneDiv.querySelector('.step-grid');
    lane.steps.forEach((step, sIdx) => {
        const sDiv = document.createElement('div');
        sDiv.className = 'step';
        sDiv.id = `lane-${lIdx}-step-${sIdx}`;
        sDiv.innerHTML = `<div class="step-indicator"></div>`;
        
        // Click to toggle
        sDiv.onclick = () => {
            step.on = !step.on;
            sDiv.classList.toggle('active', step.on);
        };

        // Long Press to Zoom
        let pressTimer;
        sDiv.onmousedown = () => { pressTimer = setTimeout(() => openZoom(lIdx, sIdx), 500); };
        sDiv.onmouseup = () => clearTimeout(pressTimer);
        sDiv.ontouchstart = () => { pressTimer = setTimeout(() => openZoom(lIdx, sIdx), 500); };
        sDiv.ontouchend = () => clearTimeout(pressTimer);

        grid.appendChild(sDiv);
    });
});

// Master Event Handlers
document.getElementById('play-btn').onclick = () => {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = true;
    nextStepTime = audioCtx.currentTime;
    scheduler();
};
document.getElementById('stop-btn').onclick = () => { isPlaying = false; currentStep = 0; };
document.getElementById('tempo').oninput = (e) => {
    tempo = e.target.value;
    document.getElementById('tempo-val').innerText = tempo + " BPM";
};

// Lane Param Handlers
document.querySelectorAll('.lane-freq').forEach(el => {
    el.oninput = (e) => {
        const lane = lanes[e.target.dataset.lane];
        lane.freq = e.target.value;
        lane.filters.forEach(f => f.frequency.value = lane.freq);
    };
});

// Zoom Logic
let activeZoomStep = null;
function openZoom(lIdx, sIdx) {
    activeZoomStep = lanes[lIdx].steps[sIdx];
    document.getElementById('zoom-title').innerText = `LANE ${lIdx+1} : STEP ${sIdx+1}`;
    document.getElementById('step-decay').value = activeZoomStep.decay;
    document.getElementById('step-prob').value = activeZoomStep.prob;
    document.getElementById('step-ratchet').value = activeZoomStep.ratchet;
    document.getElementById('zoom-overlay').style.display = 'block';
    document.getElementById('backdrop').style.display = 'block';
}

document.getElementById('close-zoom').onclick = () => {
    document.getElementById('zoom-overlay').style.display = 'none';
    document.getElementById('backdrop').style.display = 'none';
};

// Map Zoom UI back to Step Data
document.getElementById('step-decay').oninput = (e) => activeZoomStep.decay = e.target.value;
document.getElementById('step-prob').oninput = (e) => activeZoomStep.prob = e.target.value;
document.getElementById('step-ratchet').oninput = (e) => activeZoomStep.ratchet = e.target.value;
document.getElementById('step-accent-btn').onclick = (e) => {
    activeZoomStep.accent = !activeZoomStep.accent;
    e.target.classList.toggle('active', activeZoomStep.accent);
};
</script>
</body>
</html>
